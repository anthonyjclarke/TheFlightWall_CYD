; FlightWall — CYD TFT Edition
; Supports two display hardware variants selected via environment.
;
; cyd_320x240 : ESP32-2432S028R (ILI9341, 320×240, standard "CYD")
; cyd_480x320 : ESP32-3248S035R (ST7796, 480×320, larger CYD variant)
;               ** Verify TFT_BL=27 and SPI pins against your exact board revision **

[platformio]
default_envs = cyd_320x240

; ── Shared settings ──────────────────────────────────────────────────────────
[env]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 230400
board_build.partitions = partitions_custom.csv

lib_deps =
    bodmer/TFT_eSPI@^2.4.76
    tzapu/WiFiManager
    bblanchon/ArduinoJson@^6.21.0

lib_ldf_mode = deep+

; Explicit source list — NeoMatrixDisplay excluded from CYD builds
build_src_filter =
    +<*.cpp>
    +<../adapters/AeroAPIFetcher.cpp>
    +<../adapters/FlightWallFetcher.cpp>
    +<../adapters/OpenSkyFetcher.cpp>
    +<../adapters/CYDDisplay.cpp>
    +<../core/FlightDataFetcher.cpp>

; ── Common build flags shared by both CYD environments ───────────────────────
[cyd_common]
build_flags =
    -I . -I include -I src -I adapters -I core -I models -I interfaces -I utils -I config
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/HTTPClient/src
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/NetworkClientSecure/src
    -DUSER_SETUP_LOADED=1
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTOUCH_CS=33
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DDEBUG_LEVEL=3
    -DCORE_DEBUG_LEVEL=0

; ── ESP32-2432S028R — ILI9341, 320×240 ───────────────────────────────────────
[env:cyd_320x240]
build_flags =
    ${cyd_common.build_flags}
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_BL=21
    -DSPI_FREQUENCY=55000000

; ── ESP32-3248S035R — ST7796, 480×320 ────────────────────────────────────────
; NOTE: Verify TFT_BL pin and SPI_FREQUENCY against your exact board revision.
;       Some 480×320 boards use ILI9488 instead of ST7796 — swap driver flag if needed.
[env:cyd_480x320]
build_flags =
    ${cyd_common.build_flags}
    -DST7796_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_BL=27
    -DSPI_FREQUENCY=40000000
